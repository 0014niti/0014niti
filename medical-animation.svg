<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cross3d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CC0000;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow3d">
      <feDropShadow dx="3" dy="3" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <style>
      .pulse-ring {
        animation: pulse-ring 2s ease-out infinite;
      }
      @keyframes pulse-ring {
        0% { r: 20; opacity: 0.8; }
        100% { r: 100; opacity: 0; }
      }
      .pulse-ring-delay {
        animation: pulse-ring 2s ease-out infinite;
        animation-delay: 1s;
      }
      .orbit1 {
        animation: orbit1 8s linear infinite;
        transform-origin: 150px 150px;
      }
      @keyframes orbit1 {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .orbit2 {
        animation: orbit2 6s linear infinite;
        transform-origin: 150px 150px;
      }
      @keyframes orbit2 {
        from { transform: rotate(360deg); }
        to { transform: rotate(0deg); }
      }
      .cross-beat {
        animation: cross-beat 1.5s ease-in-out infinite;
        transform-origin: 150px 150px;
      }
      @keyframes cross-beat {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.08); }
      }
      .ecg-line {
        stroke-dasharray: 300;
        stroke-dashoffset: 300;
        animation: draw-ecg 2s linear infinite;
      }
      @keyframes draw-ecg {
        0% { stroke-dashoffset: 300; }
        100% { stroke-dashoffset: 0; }
      }
      .float1 {
        animation: float1 3s ease-in-out infinite;
      }
      @keyframes float1 {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      .float2 {
        animation: float2 2.5s ease-in-out infinite;
      }
      @keyframes float2 {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(8px); }
      }
      .float3 {
        animation: float3 3.5s ease-in-out infinite;
      }
      @keyframes float3 {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }
      .grid-line1 {
        animation: grid-move1 4s linear infinite;
      }
      @keyframes grid-move1 {
        0% { transform: translateX(-800px); }
        100% { transform: translateX(0); }
      }
      .grid-line2 {
        animation: grid-move2 5s linear infinite;
      }
      @keyframes grid-move2 {
        0% { transform: translateX(0); }
        100% { transform: translateX(800px); }
      }
      .grid-line3 {
        animation: grid-move1 6s linear infinite;
      }
      .shine {
        animation: shine-pulse 2s ease-in-out infinite;
      }
      @keyframes shine-pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.7; }
      }
    </style>
  </defs>

  <rect width="800" height="300" fill="#0A0A0A" rx="15"/>

  <g opacity="0.1">
    <line x1="0" y1="50" x2="800" y2="50" stroke="#00D4FF" stroke-width="1" class="grid-line1"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="#7B2FF7" stroke-width="1" class="grid-line2"/>
    <line x1="0" y1="250" x2="800" y2="250" stroke="#00D4FF" stroke-width="1" class="grid-line3"/>
  </g>

  <g class="cross-beat">
    <circle cx="150" cy="150" r="70" fill="none" stroke="#FF6B6B" stroke-width="2" opacity="0.3">
      <animate attributeName="r" values="70;75;70" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>

    <g filter="url(#shadow3d)">
      <rect x="135" y="100" width="30" height="100" rx="5" fill="url(#cross3d)"/>
      <rect x="100" y="135" width="100" height="30" rx="5" fill="url(#cross3d)"/>
      <rect x="140" y="105" width="20" height="40" rx="3" fill="white" class="shine"/>
    </g>
  </g>

  <ellipse cx="150" cy="150" rx="85" ry="25" fill="none" stroke="#00D4FF" stroke-width="2" opacity="0.5" class="orbit1"/>
  <ellipse cx="150" cy="150" rx="85" ry="25" fill="none" stroke="#7B2FF7" stroke-width="2" opacity="0.5" class="orbit2"/>

  <g transform="translate(300, 150)" filter="url(#glow)">
    <path d="M0,0 L30,0 L40,-30 L50,30 L60,-15 L70,0 L100,0 L110,-40 L120,40 L130,-20 L140,0 L200,0 L210,-35 L220,35 L230,-15 L240,0 L300,0" 
          fill="none" 
          stroke="#00D4FF" 
          stroke-width="3" 
          stroke-linecap="round"
          class="ecg-line"/>
    <path d="M0,0 L30,0 L40,-30 L50,30 L60,-15 L70,0 L100,0 L110,-40 L120,40 L130,-20 L140,0 L200,0 L210,-35 L220,35 L230,-15 L240,0 L300,0" 
          fill="none" 
          stroke="#7B2FF7" 
          stroke-width="1" 
          stroke-linecap="round"
          opacity="0.5"
          transform="translate(0, 5)"
          class="ecg-line"/>
  </g>

  <g transform="translate(650, 80)" class="float1">
    <text font-size="40" fill="#00D4FF" filter="url(#shadow3d)">&#x1FA7A;</text>
  </g>
  <g transform="translate(700, 200)" class="float2">
    <text font-size="35" fill="#7B2FF7" filter="url(#shadow3d)">&#x1F48A;</text>
  </g>
  <g transform="translate(620, 220)" class="float3">
    <text font-size="30" fill="#FF6B6B" filter="url(#shadow3d)">&#x1F9EC;</text>
  </g>

  <g transform="translate(400, 260)">
    <text x="0" y="0" font-family="monospace" font-size="24" font-weight="bold" fill="#7B2FF7" text-anchor="middle" filter="url(#shadow3d)">Dr.N</text>
    <text x="2" y="2" font-family="monospace" font-size="24" font-weight="bold" fill="#00D4FF" text-anchor="middle" opacity="0.8">Dr.N</text>
    <text x="0" y="0" font-family="monospace" font-size="24" font-weight="bold" fill="white" text-anchor="middle">Dr.N</text>
  </g>

  <circle cx="150" cy="150" r="20" fill="none" stroke="#FF6B6B" stroke-width="2" class="pulse-ring"/>
  <circle cx="150" cy="150" r="20" fill="none" stroke="#00D4FF" stroke-width="2" class="pulse-ring-delay"/>
</svg>